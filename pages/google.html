<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALARYA - Seleccionar cuenta</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <main class="login">
        <section class="cuentas">
            <div class="google-titulo">
               <span class="google-t-icono"/>
               <span class="google-titulo-texto">Google</span>
            </div>
            <h1 class="cuentas-titulo">Elige una cuenta</h1>
            <p class="cuentas-texto">Para ir a <span class="referencia">Alarya</span></p>
            <div class="cuentas-lista">
                <div class="cuenta-opcion">
                    <div class="cuenta-icono i-morado">J</div>
                    <div class="cuenta-informacion">
                        <p class="c-nombre">Juan Pérez</p>
                        <p class="c-correo">juan.perez@gmail.com</p>
                    </div>
                </div>
                <div class="cuenta-opcion">
                    <div class="cuenta-icono i-verde">M</div>
                    <div class="cuenta-informacion">
                        <p class="c-nombre">María Rodríguez</p>
                        <p class="c-correo">maria.rodriguez@gmail.com</p>
                    </div>
                </div>
                <div class="cuenta-opcion">
                    <div class="cuenta-icono i-borde">+</div>
                    <div class="cuenta-informacion">
                        <p class="c-otro">Usar otra cuenta</p>
                    </div>
                </div>
            </div>
            <div class="cuentas-mensaje">
                Para continuar, Google compartirá tu nombre, dirección de correo
                electrónico y foto de perfil con <span class="referencia">AlaRya</span>
            </div>
            <div class="cuentas-botones">
                <button class="boton-cancelar">Cancelar</button>
                <button class="boton-siguiente">Siguiente</button>
            </div>
        </section>
    </main>
</body>
